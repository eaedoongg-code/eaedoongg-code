<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus 2026 | EaeDoonGG</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg: #000000;
            --card-bg: rgba(10, 10, 10, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text-main: #ffffff;
            --text-secondary: #888888;
            --nexus-gradient: linear-gradient(135deg, #fff 0%, #888 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
        }

        /* Gradiente de fundo sutil estilo OpenAI */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1a1a1a 0%, transparent 50%);
            z-index: -1;
        }

        .main-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 40px;
        }

        .avatar-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            position: relative;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.5s ease;
            border: 1px solid var(--border);
        }

        .avatar-wrapper:hover .profile-img {
            filter: grayscale(0%);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stats-wrapper {
            margin: 32px 0;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 12px;
        }

        .stats-wrapper img {
            width: 100%;
            height: auto;
            filter: invert(1) hue-rotate(180deg) brightness(1.2); /* Ajuste para tema dark puro */
            opacity: 0.8;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 1);
            color: #000;
            border-color: #fff;
            transform: translateY(-1px);
        }

        .nexus-special {
            background: #fff;
            color: #000;
            font-weight: 600;
        }

        .nexus-special:hover {
            background: #e2e2e2;
            transform: scale(1.02);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer {
            margin-top: 48px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* Scrollbar Minimalista */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

    </style>
</head>
<body>

    <div class="main-container">
        <header class="header">
            <div class="avatar-wrapper">
                <img src="https://avatars.githubusercontent.com/u/258869226?v=4" alt="Nexus" class="profile-img">
            </div>
            <h1>EaeDoonGG</h1>
            <span class="badge">Advanced AI Systems • 2026</span>
        </header>

        <div class="stats-wrapper">
            <img src="https://github-readme-stats.vercel.app/api?username=eaedoongg-code&show_icons=true&theme=transparent&hide_border=true&title_color=ffffff&text_color=888888&icon_color=ffffff" alt="GitHub Data">
        </div>

        <nav class="nav-links">
            <a href="https://eaedoonggnexus.lovable.app/chat" target="_blank" class="link-card nexus-special">
                <div class="link-left">
                    <i data-lucide="zap" size="18"></i>
                    <span>Nexus AI Chat</span>
                </div>
                <i data-lucide="arrow-right" size="16"></i>
            </a>

            <a href="https://www.youtube.com/@eaedoongg" target="_blank" class="link-card">
                <div class="link-left">
                    <i data-lucide="play-circle" size="18"></i>
                    <span>Intelligence Hub</span>
                </div>
                <i data-lucide="arrow-up-right" size="16"></i>
            </a>

            <a href="https://x.com/EaeDoongg" target="_blank" class="link-card">
                <div class="link-left">
                    <i data-lucide="twitter" size="18"></i>
                    <span>X Protocol</span>
                </div>
                <i data-lucide="arrow-up-right" size="16"></i>
            </a>

            <a href="mailto:eaedoongg@gmail.com" class="link-card">
                <div class="link-left">
                    <i data-lucide="mail" size="18"></i>
                    <span>Direct Contact</span>
                </div>
                <i data-lucide="send" size="16"></i>
            </a>
        </nav>

        <footer class="footer">
            &copy; Nexus Advanced Ecosystem. All rights reserved.
        </footer>
    </div>

    <script>
        // Ativa os ícones da biblioteca Lucide
        lucide.createIcons();
    </script>
</body>
</html>
