<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaeDoonGG | Nexus 2026</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #1a1b26; 
            --card-bg: #212433;
            --accent-color: #7aa2f7;
            --nexus-color: #bb9af7; 
            --text-main: #c0caf5;
            --text-dim: #9aa5ce;
            --stats-bg: rgba(0, 0, 0, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 28px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            z-index: 1;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(122, 162, 247, 0.15);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(to right, #7aa2f7, #bb9af7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .username {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 25px;
            display: block;
        }

        .stats-container {
            background: var(--stats-bg);
            border-radius: 18px;
            padding: 8px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .links-grid {
            display: grid;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            padding: 16px 20px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .link-nexus {
            border: 1px solid rgba(187, 154, 247, 0.3);
            background: rgba(187, 154, 247, 0.03);
        }

        .link-card:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            transform: scale(1.02);
        }

        .link-nexus:hover {
            background: var(--nexus-color);
            border-color: var(--nexus-color);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer {
            margin-top: 35px;
            font-size: 0.75rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.05;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <div class="profile-header">
            <img src="https://avatars.githubusercontent.com/u/258869226?v=4" alt="EaeDoonGG" class="profile-img">
            <h1>EaeDoonGG</h1>
            <span class="username">@eaedoongg-code</span>
        </div>

        <div class="stats-container">
            <img src="https://github-readme-stats.vercel.app/api?username=eaedoongg-code&show_icons=true&theme=tokyonight" alt="GitHub Stats" class="stats-img">
        </div>

        <div class="links-grid">
            <a href="https://eaedoonggnexus.lovable.app/chat" target="_blank" class="link-card link-nexus">
                <div class="link-content">
                    <i data-lucide="bot"></i>
                    <span style="font-weight: 600;">Nexus AI Chat</span>
                </div>
                <i data-lucide="sparkles"></i>
            </a>

            <a href="https://www.youtube.com/@eaedoongg" target="_blank" class="link-card">
                <div class="link-content">
                    <i data-lucide="youtube"></i>
                    <span>YouTube</span>
                </div>
                <i data-lucide="external-link"></i>
            </a>

            <a href="https://x.com/EaeDoongg" target="_blank" class="link-card">
                <div class="link-content">
                    <i data-lucide="twitter"></i>
                    <span>Twitter / X</span>
                </div>
                <i data-lucide="external-link"></i>
            </a>

            <a href="mailto:eaedoongg@gmail.com" class="link-card">
                <div class="link-content">
                    <i data-lucide="mail"></i>
                    <span>E-mail Profissional</span>
                </div>
                <i data-lucide="send"></i>
            </a>
        </div>

        <div class="footer">
            &copy; 2026 • DESIGNED BY EAEDOONGG
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
